<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
</head>
<body>
    <h2>Enter text to analyze sentiment</h2>
    <form method="POST">
        <input type="text" name="text" placeholder="Type something..." required>
        <button type="submit">Analyze</button>
    </form>
    {% if sentiment %}
        <h3>Result: {{ sentiment }}</h3>
    {% endif %}
</body>
</html>
